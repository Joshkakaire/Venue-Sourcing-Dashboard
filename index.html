<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Venue Mapping Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh}
button{cursor:pointer}a{text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:99px}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e1b4b,#3730a3,#4f46e5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:24px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.login-logo{font-size:40px;text-align:center;margin-bottom:8px}
.login-title{font-weight:900;font-size:22px;color:#1e1b4b;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:28px}
.login-label{font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;display:block}
.login-input{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #e2e8f0;font-size:14px;outline:none;margin-bottom:14px;transition:border .2s}
.login-input:focus{border-color:#6366f1}
.login-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-weight:800;font-size:15px;margin-top:4px}
.login-err{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.login-note{text-align:center;font-size:12px;color:#94a3b8;margin-top:18px;line-height:1.6}
.viewer-link{color:#6366f1;font-weight:700;cursor:pointer;background:none;border:none;font-size:12px}

/* NAV */
#topnav{background:linear-gradient(135deg,#1e1b4b 0%,#3730a3 60%,#4f46e5 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px}
.nav-top{display:flex;justify-content:space-between;align-items:center;padding:12px 0;flex-wrap:wrap;gap:8px}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-icon{background:rgba(255,255,255,.15);border-radius:12px;padding:8px 10px;font-size:22px}
.nav-title{font-weight:900;font-size:17px;color:#fff}
.nav-sub{color:#a5b4fc;font-size:11px;margin-top:1px}
.nav-btns{display:flex;gap:8px;align-items:center}
.nav-btn{border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;border:1px solid rgba(255,255,255,.3);transition:all .15s}
.nav-btn-primary{background:rgba(255,255,255,.15);color:#fff}
.nav-btn-primary.active{background:#fff;color:#4f46e5}
.nav-btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:11px}
.admin-badge{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;border:none}
.viewer-badge{background:rgba(255,255,255,.12);color:#a5b4fc;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;border:none}

/* CONNECT PANEL */
#connect-panel{background:rgba(0,0,0,.25);border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.12);display:none}
#connect-panel.open{display:block}
.connect-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:10px}
.connect-input{padding:10px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-size:13px;outline:none;width:100%}
.connect-input::placeholder{color:rgba(255,255,255,.4)}
.fetch-btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:700;font-size:13px;white-space:nowrap}
.fetch-btn:disabled{opacity:.5}
.auto-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.1);padding-top:10px}
.auto-label{display:flex;align-items:center;gap:6px;color:#c7d2fe;font-size:12px}
.auto-select{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:4px 8px;font-size:12px}
.upload-label{background:rgba(255,255,255,.08);color:#c7d2fe;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}
.status-msg{margin-bottom:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;line-height:1.6;white-space:pre-line;display:none}
.status-ok{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);color:#86efac;display:block}
.status-err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fca5a5;display:block}
.status-info{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#c7d2fe;display:block}

/* TABS */
.tabs{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px;width:fit-content;margin-bottom:12px}
.tab{padding:8px 16px;border-radius:8px;font-weight:700;font-size:12px;border:none;transition:all .15s}
.tab.active{background:#fff;color:#1e1b4b;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.tab:not(.active){background:transparent;color:rgba(255,255,255,.7)}

/* CONTENT */
#content{max-width:1280px;margin:0 auto;padding:20px}

/* LIVE BANNER */
.live-banner{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac;border-radius:14px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.live-dot{width:8px;height:8px;border-radius:99px;background:#16a34a;animation:livepulse 1.5s infinite;display:inline-block;margin-right:8px}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.3}}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi-label{font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:900;color:#0f172a;line-height:1}
.kpi-sub{font-size:12px;color:#64748b;margin-top:4px}

/* SECTION */
.section-card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}
.section-title{font-weight:800;font-size:15px;color:#0f172a;margin-bottom:16px}
.section-sub{font-size:12px;color:#94a3b8;font-weight:400;margin-left:8px}

/* OVERVIEW GRID */
.overview-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:768px){.overview-2col{grid-template-columns:1fr}}

/* MOBILISER ROW */
.mob-row{display:flex;align-items:center;gap-12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.mob-row:last-child{border-bottom:none}
.mob-avatar{width:36px;height:36px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.mob-bar-wrap{flex:1;background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden;margin:0 12px}
.mob-bar-fill{height:100%;border-radius:99px}

/* DISTRICT ROW */
.dist-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9}
.dist-row:last-child{border-bottom:none}

/* BADGE */
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-YES{background:#dcfce7;color:#16a34a;border:1px solid #16a34a44}
.badge-MAYBE{background:#fef3c7;color:#d97706;border:1px solid #d9780644}
.badge-NO{background:#fee2e2;color:#dc2626;border:1px solid #dc262644}

/* MINI BAR */
.bar-wrap{background:#f1f5f9;border-radius:99px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:99px}

/* FILTERS */
.filters{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.filter-input{padding:8px 12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:13px;outline:none;background:#fff}
.filter-input:focus{border-color:#6366f1}
.clear-btn{padding:8px 12px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:700;color:#64748b}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.venue-card{background:#fff;border-radius:14px;padding:16px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #f1f5f9;transition:all .18s}
.venue-card:hover{box-shadow:0 4px 20px rgba(99,102,241,.12);border-color:#c7d2fe;transform:translateY(-2px)}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
#modal-overlay.open{display:flex}
#modal-box{background:#fff;border-radius:20px;max-width:720px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal-header{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:20px 20px 0 0;padding:22px 26px;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:99px;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 24px}
.modal-rank-bar{margin-top:12px;background:rgba(255,255,255,.08);border-radius:10px;padding:8px 14px;display:flex;gap:16px;font-size:12px;color:#c7d2fe;flex-wrap:wrap}

/* AI */
.ai-panel{background:linear-gradient(135deg,#f5f3ff,#eff6ff);border:1px solid #c4b5fd;border-radius:14px;padding:16px;margin-bottom:16px}
.ai-title{font-weight:800;font-size:13px;color:#6d28d9;margin-bottom:8px}
.ai-content{font-size:13px;color:#1e1b4b;line-height:1.75}
.ai-loading{display:flex;align-items:center;gap:8px;color:#7c3aed;font-size:13px}
.ai-dot{width:8px;height:8px;border-radius:99px;background:#7c3aed;animation:pulse 1s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ai-btn{background:#7c3aed;color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:12px;margin-top:10px}
.ai-btn:disabled{opacity:.5}
.q-item{display:flex;gap:10px;align-items:flex-start;border-radius:10px;padding:9px 13px;margin-bottom:6px;font-size:13px;line-height:1.5}
.q-str{background:#f0fdf4;border:1px solid #bbf7d0;color:#14532d}
.q-con{background:#fffbeb;border:1px solid #fde68a;color:#78350f}
.q-rec{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#1e1b4b}
thead th{padding:10px 12px;color:#fff;font-weight:700;text-align:left;white-space:nowrap}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:nth-child(even){background:#f8fafc}
tbody tr:hover{background:#eef2ff}
tbody td{padding:10px 12px;color:#334155}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.score-block{background:#f8fafc;border-radius:14px;padding:14px}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.contact-block{background:#f8fafc;border-radius:14px;padding:14px}
.contact-label{font-weight:700;font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* PASTE MODAL */
#paste-overlay{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}

@media(max-width:600px){
  .score-grid,.contact-grid{grid-template-columns:1fr}
  .connect-row{grid-template-columns:1fr;grid-template-rows:auto auto auto}
  .kpis{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🏛</div>
    <div class="login-title">Venue Mapping Dashboard</div>
    <div class="login-sub">Experience Educate · Bugiri &amp; Bugweri</div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="publicLogin()" style="margin-bottom:12px">View Dashboard →</button>
    <div style="text-align:center;color:#94a3b8;font-size:12px;margin-bottom:16px">— or sign in as admin —</div>
    <label class="login-label">Admin Email</label>
    <input id="login-email" class="login-input" type="email" placeholder="joshua.kakaire@experienceeducate.org" onkeydown="if(event.key==='Enter')doLogin()"/>
    <label class="login-label">Password</label>
    <input id="login-pass" class="login-input" type="password" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()" style="background:linear-gradient(135deg,#374151,#1f2937)">Sign In as Admin</button>
  </div>
</div>

<!-- NAV -->
<div id="topnav">
  <div class="nav-inner">
    <div class="nav-top">
      <div class="nav-brand">
        <div class="nav-icon">🏛</div>
        <div>
          <div class="nav-title">Venue Mapping Dashboard</div>
          <div class="nav-sub" id="nav-sub">Connecting…</div>
        </div>
      </div>
      <div class="nav-btns">
        <span id="role-badge" class="viewer-badge">👁 Viewer</span>
        <button id="connect-toggle-btn" class="nav-btn nav-btn-primary" onclick="toggleConnect()" style="display:none">⚙️ Data</button>
        <button class="nav-btn nav-btn-ghost" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
    <div id="connect-panel">
      <div style="color:#e0e7ff;font-weight:800;font-size:13px;margin-bottom:10px">🔗 Data Connection</div>
      <div class="connect-row">
        <input id="sheet-url" class="connect-input" placeholder="Apps Script Web App URL…"/>
        <button class="fetch-btn" id="fetch-btn" onclick="fetchSheet()">⚡ Fetch</button>
        <button class="fetch-btn" style="background:#059669" onclick="testFetchSheet()">🧪 Test</button>
      </div>
      <div id="sync-status" class="status-msg"></div>
      <div class="auto-row">
        <label class="auto-label"><input type="checkbox" id="auto-refresh" style="accent-color:#6366f1;width:14px;height:14px" checked/> Auto-refresh every</label>
        <select id="refresh-interval" class="auto-select">
          <option value="30">30 sec</option><option value="60" selected>1 min</option>
          <option value="300">5 min</option><option value="600">10 min</option>
        </select>
        <span style="color:#64748b;font-size:12px">|</span>
        <label class="upload-label" style="cursor:pointer">📂 Upload CSV<input type="file" accept=".csv" style="display:none" onchange="handleCSV(this)"/></label>
        <button class="upload-label" onclick="showPasteModal()" style="border:none">📋 Paste CSV</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
      <button class="tab" onclick="switchTab('venues')">🏢 Venues</button>
      <button class="tab" onclick="switchTab('qualitative')">🧠 Qualitative</button>
      <button class="tab" onclick="switchTab('analysis')">📈 Analysis</button>
      <button class="tab" onclick="switchTab('contacts')">📞 Contacts</button>
    </div>
  </div>
</div>

<div id="content"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box" onclick="event.stopPropagation()"></div>
</div>

<!-- PASTE MODAL -->
<div id="paste-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:2000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:16px;padding:24px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-weight:800;font-size:16px;color:#0f172a;margin-bottom:6px">📋 Paste CSV Data</div>
    <textarea id="csv-paste-area" style="width:100%;height:200px;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;font-size:12px;font-family:monospace;resize:vertical;outline:none" placeholder="venue_name,district,subcounty,..."></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button onclick="document.getElementById('paste-overlay').style.display='none'" style="padding:10px 18px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;font-weight:700;font-size:13px;color:#64748b">Cancel</button>
      <button onclick="processPastedCSV()" style="padding:10px 18px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:700;font-size:13px">Load</button>
    </div>
  </div>
</div>

<script>
const LIVE_SHEET_URL='https://script.google.com/macros/s/AKfycbxvUoIjtOKCB_9gVT-VwU8Moz-sWDFX3CchswcQFvJycNJNJrArti5r06t7ro00lGmgzw/exec';
const USERS={'joshua.kakaire@experienceeducate.org':{password:'EE@Admin2025!',role:'admin',name:'Joshua Kakaire'}};
const VIEWER_PASSWORD='EETeam2025';
const CAT_COL={community_public:'#6366f1',faith_based:'#8b5cf6',private_enterprise:'#ec4899',schools:'#0ea5e9',education_adjacent:'#14b8a6'};
const MOB_COLORS=['#6366f1','#0ea5e9','#10b981','#f59e0b','#ec4899','#8b5cf6','#14b8a6','#ef4444'];

let appData=[],currentTab='overview',autoRefreshTimer=null,aiCache={},lastSyncTime=null,dataSource='live';
let modalInnerTab='ai';
let venueFilter={search:'',district:'All',subcounty:'All',parish:'All',contractor:'All',rank:'All',sort:'overall_score'};

// ─── HELPERS ───────────────────────────────────────────────────────────────
const fmt=s=>s?String(s).replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()):'';
const pct=(v,max)=>Math.round((v/max)*100);
function overallRank(v){
  // Use grand_rank column: >=75 → YES, 60–74 → MAYBE, <60 → NO
  const gr=v.grand_rank!=null?v.grand_rank:(v.overall_score!=null?v.overall_score:null);
  if(gr===null||gr===undefined)return'NO';
  const score=parseFloat(gr);
  if(!isNaN(score)){if(score>=75)return'YES';if(score>=60)return'MAYBE';return'NO';}
  const s=String(gr).trim().toUpperCase();
  if(s==='YES'||s==='MAYBE'||s==='NO')return s;
  return'NO';
}
function badge(rank){return`<span class="badge badge-${rank}">${rank}</span>`;}
function miniBar(val,max,color,height=8){return`<div class="bar-wrap" style="height:${height}px"><div class="bar-fill" style="width:${Math.min((val/max)*100,100)}%;background:${color};height:${height}px"></div></div>`;}
function scoreColor(p){return p>=75?'#16a34a':p>=60?'#d97706':'#dc2626';}
function initials(name){return(name||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2);}

// ─── AUTH ──────────────────────────────────────────────────────────────────
function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(USERS[email]){
    if(pass===USERS[email].password){currentUser={email,role:USERS[email].role,name:USERS[email].name};bootApp();return;}
    err.textContent='❌ Incorrect password.';err.style.display='block';return;
  }
  if(email.endsWith('@experienceeducate.org')&&pass===VIEWER_PASSWORD){currentUser={email,role:'viewer',name:email.split('@')[0]};bootApp();return;}
  err.textContent='❌ Not recognised. Contact joshua.kakaire@experienceeducate.org';err.style.display='block';
}
function publicLogin(){
  currentUser={email:'public',role:'viewer',name:'Guest'};
  bootApp();
}
function viewerLogin(){
  currentUser={email:'viewer',role:'viewer',name:'Team Viewer'};bootApp();
}
function doLogout(){currentUser=null;document.getElementById('login-screen').style.display='flex';document.getElementById('topnav').style.display='none';document.getElementById('content').style.display='none';}
let currentUser=null;
function bootApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('topnav').style.display='block';
  document.getElementById('content').style.display='block';
  const b=document.getElementById('role-badge');
  if(currentUser.role==='admin'){
    b.className='admin-badge';b.textContent='⚡ '+currentUser.name;
    document.getElementById('connect-toggle-btn').style.display='';
  } else {
    b.className='viewer-badge';
    b.textContent=currentUser.email==='public'?'👁 Guest Viewer':'👁 '+currentUser.name;
  }
  document.getElementById('sheet-url').value=LIVE_SHEET_URL;
  fetchSheet(true);
}

// ─── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}
function normH(h){return h.replace(/^\uFEFF/,'').replace(/"/g,'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');}
const ALIASES={venue_name:['venue_name','venuename','name','venue'],district:['district'],subcounty:['subcounty','sub_county'],parish:['parish'],village:['village'],venue_category:['venue_category','category'],venue_type:['venue_type','type'],contractor:['contractor','assessor','mobiliser','mobilizer'],contact_name:['contact_name','contact'],contact_phone1:['contact_phone1','phone1','phone'],contact_phone2:['contact_phone2','phone2'],contact_email:['contact_email','email'],invoice_pdf_URL:['invoice_pdf_url','invoice_url'],photo_url:['photo_url','photo','venue_photo','image_url','image','venue_image','photo_link'],transport_accessibility:['transport_accessibility','transport'],proximity_to_social_amenities:['proximity_to_social_amenities','proximity'],location_total:['location_total'],location_rank:['location_rank'],training_room_size:['training_room_size','room_size'],washrooms:['washrooms'],seating_chairs:['seating_chairs','seating','chairs'],tables:['tables'],storage_room:['storage_room','storage'],facility_total:['facility_total'],facility_rank:['facility_rank'],building_compound_security:['building_compound_security'],lockable_training_rooms:['lockable_training_rooms','lockable'],handwashing_stations:['handwashing_stations','handwashing'],security_personnel:['security_personnel','personnel'],safety_total:['safety_total'],safety_rank:['safety_rank'],cleanliness_flow_quality:['cleanliness_flow_quality','cleanliness'],washroom_cleanliness:['washroom_cleanliness'],ventilation:['ventilation'],lighting:['lighting'],roof_condition:['roof_condition','roof'],outdoor_space:['outdoor_space','outdoor'],convenience_total:['convenience_total'],convenience_rank:['convenience_rank'],assessor_notes:['assessor_notes','notes','comments'],grand_rank:['grand_rank','grandrank','grand rank','total_rank','totalrank'],_venue_gps_latitude:['_venue_gps_latitude','latitude','lat'],_venue_gps_longitude:['_venue_gps_longitude','longitude','lng','lon']};
const HMAP={};Object.entries(ALIASES).forEach(([c,as])=>as.forEach(a=>{HMAP[normH(a)]=c;}));
function parseCSV(text){
  const clean=text.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=clean.split('\n').filter(l=>l.trim());if(lines.length<2)throw new Error('CSV has fewer than 2 rows.');
  let hi=0;for(let i=0;i<Math.min(5,lines.length);i++){if(parseCSVLine(lines[i]).map(normH).some(c=>HMAP[c])){hi=i;break;}}
  const rawH=parseCSVLine(lines[hi]).map(normH),colMap=rawH.map(h=>HMAP[h]||null),rows=[];
  for(let i=hi+1;i<lines.length;i++){
    const vals=parseCSVLine(lines[i]),obj={};
    colMap.forEach((c,idx)=>{if(!c)return;const raw=vals[idx]!==undefined?vals[idx].replace(/^"|"$/g,'').trim():'';obj[c]=(raw!==''&&!isNaN(raw))?parseFloat(raw):(raw===''?null:raw);});
    const nm=obj.venue_name;if(!nm||String(nm).trim()==='')continue;
    obj.venue_name=String(nm).trim();
    obj.overall_score=(obj.location_total||0)+(obj.facility_total||0)+(obj.safety_total||0)+(obj.convenience_total||0);
    rows.push(obj);
  }
  return rows;
}

// ─── FETCH ─────────────────────────────────────────────────────────────────
function isAppsScriptUrl(url){return url.includes('script.google.com/macros/s/');}
async function fetchSheet(silent=false){
  const url=(document.getElementById('sheet-url')||{value:LIVE_SHEET_URL}).value.trim()||LIVE_SHEET_URL;
  const btn=document.getElementById('fetch-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳…';}
  if(!silent)setSyncStatus('🔄 Fetching live data…','info');
  try{
    let parsed=[];
    if(isAppsScriptUrl(url)){
      const res=await fetch(url+'?action=data');
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const json=await res.json();
      if(!json.ok)throw new Error(json.error||'Apps Script error.');
      if(!json.venues||!json.venues.length)throw new Error('0 venue rows returned.');
      parsed=json.venues;
      parsed.forEach(v=>{
        if(!v.overall_score)v.overall_score=(v.location_total||0)+(v.facility_total||0)+(v.safety_total||0)+(v.convenience_total||0);
        // normalise grand_rank key (Apps Script may return camelCase)
        if(v.grand_rank==null&&v.grandRank!=null)v.grand_rank=v.grandRank;
        if(v.grand_rank==null&&v['grand rank']!=null)v.grand_rank=v['grand rank'];
      });
    }else{
      const res=await fetch(url);if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const text=await res.text();if(text.startsWith('<!'))throw new Error('Got HTML — use Apps Script URL.');
      parsed=parseCSV(text);if(!parsed.length)throw new Error('0 rows parsed.');
    }
    appData=parsed;aiCache={};lastSyncTime=new Date();dataSource='live';
    setSyncStatus(`✅ ${parsed.length} venues loaded (${lastSyncTime.toLocaleTimeString()})`,true);
    updateNavSub();renderContent();setupAutoRefresh();
  }catch(err){
    setSyncStatus(`❌ ${err.message}`,false);
    updateNavSub('⚠️ Connection failed');
    if(appData.length===0)document.getElementById('content').innerHTML=renderOfflineBanner();
  }
  if(btn){btn.disabled=false;btn.textContent='⚡ Fetch';}
}
async function testFetchSheet(){
  const url=(document.getElementById('sheet-url')||{value:''}).value.trim();
  if(!url){setSyncStatus('❌ Enter a URL first.',false);return;}
  setSyncStatus('🔍 Testing…','info');
  try{
    if(isAppsScriptUrl(url)){
      const res=await fetch(url+'?action=ping');const json=await res.json();
      setSyncStatus(`✅ ${json.message}`,true);
    }else setSyncStatus('⚠️ Use an Apps Script Web App URL.',false);
  }catch(e){setSyncStatus(`❌ ${e.message}`,false);}
}
function setupAutoRefresh(){
  if(autoRefreshTimer)clearInterval(autoRefreshTimer);

function updateNavSub(custom){const s=document.getElementById('nav-sub');if(!s)return;s.textContent=custom||`${appData.length} venues · 🟢 Live · ${lastSyncTime?lastSyncTime.toLocaleTimeString():''}`;}
function toggleConnect(){if(currentUser?.role!=='admin')return;const p=document.getElementById('connect-panel');const b=document.getElementById('connect-toggle-btn');const open=p.classList.toggle('open');b.classList.toggle('active',open);}

  try{

function formatAIResponse(text){
  if(!text)return'';let html='';const lines=text.split('\n');let inList=null;
  const closeList=()=>{if(inList){html+='</div>';inList=null;}};
  lines.forEach(line=>{
    line=line.trim();if(!line)return;
    if(line.startsWith('SUMMARY:')){closeList();html+=`<div style="font-style:italic;color:#1e1b4b;font-size:13px;background:#f0f4ff;border-radius:10px;padding:10px 14px;margin-bottom:12px;border-left:3px solid #6366f1;line-height:1.7">${line.replace('SUMMARY:','').trim()}</div>`;}
    else if(line.startsWith('STRENGTHS:')){closeList();html+=`<div style="font-weight:800;font-size:12px;color:#15803d;margin:10px 0 6px">✅ Strengths</div><div>`;inList='str';}
    else if(line.startsWith('CONCERNS:')){closeList();html+=`<div style="font-weight:800;font-size:12px;color:#b45309;margin:10px 0 6px">⚠️ Concerns</div><div>`;inList='con';}
    else if(line.startsWith('RECOMMENDATIONS:')){closeList();html+=`<div style="font-weight:800;font-size:12px;color:#1d4ed8;margin:10px 0 6px">💡 Recommendations</div><div>`;inList='rec';}
    else if(line.startsWith('VERDICT:')){closeList();const v2=line.replace('VERDICT:','').trim();const isY=v2.startsWith('YES'),isN=v2.startsWith('NO');const bg=isY?'#f0fdf4':isN?'#fff1f2':'#fffbeb';const col=isY?'#16a34a':isN?'#dc2626':'#d97706';html+=`<div style="margin-top:12px;background:${bg};border:2px solid ${col}33;border-radius:12px;padding:10px 14px;font-weight:800;font-size:13px;color:${col}">🏁 Verdict: ${v2}</div>`;}
    else if(line.startsWith('-')&&inList){const txt=line.replace(/^-\s*/,'');const cls=inList==='str'?'q-str':inList==='con'?'q-con':'q-rec';const icon=inList==='str'?'✓':inList==='con'?'!':'→';html+=`<div class="q-item ${cls}"><span style="flex-shrink:0;font-weight:700">${icon}</span><span>${txt}</span></div>`;}
  });
  closeList();return html||`<div style="font-size:13px;color:#334155;line-height:1.7">${text}</div>`;
}

    <div class="section-title">🏆 Top Performing Venues</div>

// ══ VENUES ══════════════════════════════════════════════════════════════════
function renderVenues(filter={}){
  const search=(filter.search||'').toLowerCase();
  const fDist=filter.district||'All';
  const fSub=filter.subcounty||'All';
  const fParish=filter.parish||'All';
  const fCont=filter.contractor||'All';
  const fRank=filter.rank||'All';
  const sortBy=filter.sort||'overall_score';

  const uq=(key)=>['All',...new Set(appData.map(d=>d[key]).filter(Boolean)).values()];
  const districts=uq('district'),subcounties=uq('subcounty'),parishes=uq('parish'),contractors=uq('contractor');

  let filtered=appData.filter(v=>{
    const ms=!search||[v.venue_name,v.contractor,v.district,v.subcounty,v.parish,v.contact_name].some(f=>String(f||'').toLowerCase().includes(search));
    return ms
      &&(fDist==='All'||v.district===fDist)
      &&(fSub==='All'||v.subcounty===fSub)
      &&(fParish==='All'||v.parish===fParish)
      &&(fCont==='All'||v.contractor===fCont)
      &&(fRank==='All'||overallRank(v)===fRank);
  }).sort((a,b)=>sortBy==='overall_score'?b.overall_score-a.overall_score:sortBy==='venue_name'?a.venue_name.localeCompare(b.venue_name):a.district.localeCompare(b.district));

  const sel=(arr,label,cur,key)=>arr.map(v=>`<option value="${v}" ${cur===v?'selected':''}>${v==='All'?label:fmt(v)}</option>`).join('');

  const cards=filtered.map(v=>{
    const rank=overallRank(v);const p=pct(v.overall_score,85);const col=CAT_COL[v.venue_category]||'#6366f1';
    return`<div class="venue-card" onclick="openModal('${v.venue_name.replace(/'/g,"\\'")}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1;padding-right:8px">
          <div style="font-weight:800;font-size:14px;color:#0f172a;line-height:1.3;margin-bottom:3px">${v.venue_name}</div>
          <div style="font-size:11px;color:#94a3b8;line-height:1.7">
            📍 ${fmt(v.district)} · ${fmt(v.subcounty)} · ${fmt(v.parish)}<br/>
            👤 <span style="color:#14b8a6;font-weight:600">${v.contractor||'—'}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${badge(rank)}
          <div style="font-weight:900;font-size:22px;color:${scoreColor(p)};margin-top:4px">${p}%</div>
        </div>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
        <span style="background:${col}18;color:${col};font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px">${fmt(v.venue_category)}</span>
        ${isSchool(v)?`<span style="background:#ede9fe;color:#7c3aed;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px">🏫 School</span>`:''}
      </div>
      ${[['Loc',v.location_total,10,'#6366f1'],['Fac',v.facility_total,25,'#0ea5e9'],['Safe',v.safety_total,20,'#10b981'],['Conv',v.convenience_total,30,'#f59e0b']].map(([l,val,mx,c])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:10px;color:#94a3b8;width:30px">${l}</span>${miniBar(val,mx,c)}<span style="font-size:10px;font-weight:700;color:${c};width:26px;text-align:right">${val}/${mx}</span></div>`).join('')}
      <div style="margin-top:8px;font-size:11px;color:#94a3b8;text-align:right">Click for AI analysis →</div>
    </div>`;
  }).join('');

  return`
  <div class="filters">
    <input class="filter-input" style="flex:1;min-width:200px" placeholder="🔍 Search by venue name or contractor…" value="${filter.search||''}" oninput="venueFilter.search=this.value;renderContent()"/>
    <select class="filter-input" onchange="venueFilter.district=this.value;renderContent()">${sel(districts,'All Districts',fDist)}</select>
    <select class="filter-input" onchange="venueFilter.subcounty=this.value;renderContent()">${sel(subcounties,'All Subcounties',fSub)}</select>
    <select class="filter-input" onchange="venueFilter.parish=this.value;renderContent()">${sel(parishes,'All Parishes',fParish)}</select>
    <select class="filter-input" onchange="venueFilter.contractor=this.value;renderContent()">${sel(contractors,'All Contractors',fCont)}</select>
    <select class="filter-input" onchange="venueFilter.rank=this.value;renderContent()">
      <option value="All">All Results</option>
      <option value="YES" ${fRank==='YES'?'selected':''}>✅ YES</option>
      <option value="MAYBE" ${fRank==='MAYBE'?'selected':''}>⚠️ MAYBE</option>
      <option value="NO" ${fRank==='NO'?'selected':''}>❌ NO</option>
    </select>
    <select class="filter-input" onchange="venueFilter.sort=this.value;renderContent()">
      <option value="overall_score">Score ↓</option>
      <option value="venue_name">Name A–Z</option>
      <option value="district">District</option>
    </select>
    <button class="clear-btn" onclick="venueFilter={search:'',district:'All',subcounty:'All',parish:'All',contractor:'All',rank:'All',sort:'overall_score'};renderContent()">✕ Clear</button>
    <span style="font-size:12px;color:#94a3b8;font-weight:600;align-self:center">${filtered.length} result${filtered.length!==1?'s':''}</span>
  </div>
  <div class="cards-grid">${filtered.length?cards:`<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8"><div style="font-size:40px">🔍</div><div style="font-weight:700;margin-top:8px">No venues match</div></div>`}</div>`;
}

        </div>

      ${v.assessor_notes?`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-top:10px"><div style="font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">📝 Field Notes</div><div style="font-size:13px;color:#334155;line-height:1.7">${v.assessor_notes}</div></div>`:''}

// ══ ANALYSIS ═════════════════════════════════════════════════════════════════
function renderAnalysis(){
  const sorted=[...appData].sort((a,b)=>b.overall_score-a.overall_score);
  const rows=sorted.map((v,i)=>{const rank=overallRank(v);const p=pct(v.overall_score,85);return`<tr onclick="openModal('${v.venue_name.replace(/'/g,"\\'")}')"><td style="font-weight:700;color:#6366f1">#${i+1}</td><td style="font-weight:700">${v.venue_name}</td><td style="text-transform:capitalize">${v.district}</td><td style="text-transform:capitalize">${v.subcounty||'—'}</td><td style="color:#14b8a6;font-weight:600">${v.contractor||'—'}</td><td><div style="display:flex;align-items:center;gap:4px"><span style="font-weight:700;color:#6366f1">${v.location_total}</span>${badge(v.location_rank)}</div></td><td><div style="display:flex;align-items:center;gap:4px"><span style="font-weight:700;color:#0ea5e9">${v.facility_total}</span>${badge(v.facility_rank)}</div></td><td><div style="display:flex;align-items:center;gap:4px"><span style="font-weight:700;color:#10b981">${v.safety_total}</span>${badge(v.safety_rank)}</div></td><td><div style="display:flex;align-items:center;gap:4px"><span style="font-weight:700;color:#f59e0b">${v.convenience_total}</span>${badge(v.convenience_rank)}</div></td><td><b>${v.overall_score}</b></td><td><span style="font-weight:900;color:${scoreColor(p)}">${p}%</span></td><td>${badge(rank)}</td></tr>`;}).join('');

function renderContacts(){

        <div style="flex:1">
          <div style="font-weight:900;font-size:18px;color:#fff;margin-bottom:3px">${v.venue_name}</div>
          <div style="color:#a5b4fc;font-size:12px;margin-bottom:8px">${fmt(v.district)} · ${fmt(v.subcounty)} · ${fmt(v.parish)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span class="modal-tag" style="background:${col}33;color:#c7d2fe;border:1px solid ${col}55;padding:3px 10px;border-radius:99px;font-size:11px">${fmt(v.venue_category)}</span>
            <span style="background:rgba(255,255,255,.1);color:#c7d2fe;padding:3px 10px;border-radius:99px;font-size:11px">👤 ${v.contractor||'—'}</span>
            ${isSchool(v)?`<span style="background:rgba(139,92,246,.3);color:#e9d5ff;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700">🏫 School</span>`:`<span style="background:rgba(255,255,255,.08);color:#94a3b8;padding:3px 10px;border-radius:99px;font-size:11px">🏛 Non-School</span>`}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:42px;font-weight:900;color:${p>=75?'#86efac':p>=60?'#fcd34d':'#fca5a5'};line-height:1">${p}%</div>
          <div style="color:#a5b4fc;font-size:12px">${v.overall_score}/85 pts</div>
          <div style="margin-top:6px">${badge(rank)}</div>
        </div>
      </div>
      <div class="modal-rank-bar">
        <span>🏆 Ranked <b style="color:#fcd34d">#${pos}</b> of ${appData.length}</span>
        <span>🌍 Overall avg: <b style="color:#86efac">${Math.round(avgAll/85*100)}%</b></span>
      </div>
    </div>
    <div style="display:flex;gap:3px;padding:10px 16px 0;border-bottom:1px solid #f1f5f9;background:#fafafa">
      <button style="${iS('ai')}" onclick="switchModalTab('${sk}','ai')">🧠 AI Analysis</button>
      <button style="${iS('scores')}" onclick="switchModalTab('${sk}','scores')">📊 Scores</button>
      <button style="${iS('contacts')}" onclick="switchModalTab('${sk}','contacts')">📞 Contacts</button>
    </div>
    <div class="modal-body">${body}</div>`;
}
function switchModalTab(name,tab){modalInnerTab=tab;const v=appData.find(x=>x.venue_name===name);if(v)renderModal(v);}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('topnav').style.display='none';
document.getElementById('content').style.display='none';
</script>
</body>
</html>
